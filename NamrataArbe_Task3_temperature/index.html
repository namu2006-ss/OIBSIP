<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter | Celsius, Fahrenheit & Kelvin</title>
  <meta name="description" content="A modern, responsive temperature converter built with HTML, CSS and JavaScript." />

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Decorative animated background blobs -->
  <div class="background-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="page-wrapper">

    <!-- ===== Header ===== -->
    <header class="app-header">
      <div class="app-logo">
        <i class="fa-solid fa-temperature-half"></i>
      </div>
      <h1>Temperature Converter</h1>
      <p class="subtitle">Convert between Celsius, Fahrenheit &amp; Kelvin instantly</p>
    </header>

    <!-- ===== Converter Card (Glassmorphism) ===== -->
    <section class="converter-card" aria-label="Temperature Converter Tool">

      <!-- Input Field -->
      <div class="form-group">
        <label for="tempInput">Enter Temperature</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-thermometer-half input-icon"></i>
          <input
            type="text"
            id="tempInput"
            placeholder="e.g. 36.6"
            inputmode="decimal"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- Conversion Type Dropdown -->
      <div class="form-group">
        <label for="conversionType">Conversion Type</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-arrow-right-arrow-left input-icon"></i>
          <select id="conversionType">
            <option value="CtoF">Celsius &rarr; Fahrenheit</option>
            <option value="FtoC">Fahrenheit &rarr; Celsius</option>
            <option value="CtoK">Celsius &rarr; Kelvin</option>
            <option value="KtoC">Kelvin &rarr; Celsius</option>
            <option value="FtoK">Fahrenheit &rarr; Kelvin</option>
            <option value="KtoF">Kelvin &rarr; Fahrenheit</option>
          </select>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="button-group">
        <button id="convertBtn" class="btn btn-primary" type="button">
          <i class="fa-solid fa-calculator"></i> Convert
        </button>
        <button id="resetBtn" class="btn btn-secondary" type="button">
          <i class="fa-solid fa-rotate-left"></i> Reset
        </button>
      </div>

      <!-- Message Box (Error / Success) -->
      <div id="messageBox" class="message-box" role="alert"></div>

      <!-- Result Display -->
      <div id="resultBox" class="result-box">
        <span class="result-label">Converted Result</span>
        <span id="resultValue" class="result-value">--</span>
      </div>

    </section>

    <!-- ===== Footer ===== -->
    <footer class="app-footer">
      <p>Built with <i class="fa-solid fa-heart"></i> using HTML, CSS &amp; JavaScript</p>
    </footer>

  </main>

  <!-- Custom JavaScript -->
  <script src="script.js"></script>
</body>
</html>
