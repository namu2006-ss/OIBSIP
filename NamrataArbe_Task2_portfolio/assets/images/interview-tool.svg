<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Interview preparation chat interface illustration">
  <defs>
    <linearGradient id="bgG5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1730"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="url(#bgG5)"/>

  <!-- chat card -->
  <rect x="120" y="60" width="240" height="200" rx="16" fill="#0B1730" stroke="#2563EB" stroke-width="2"/>

  <!-- question bubble -->
  <rect x="140" y="86" width="160" height="36" rx="12" fill="#1E3A8A"/>
  <text x="155" y="109" font-family="Poppins, sans-serif" font-size="12" fill="#E2E8F0">Tell me about yourself</text>

  <!-- answer bubble -->
  <rect x="160" y="134" width="160" height="36" rx="12" fill="#2563EB"/>
  <text x="178" y="157" font-family="Poppins, sans-serif" font-size="12" fill="#F8FAFC">I am a B.Tech student...</text>

  <!-- question bubble 2 -->
  <rect x="140" y="182" width="180" height="36" rx="12" fill="#1E3A8A"/>
  <text x="155" y="205" font-family="Poppins, sans-serif" font-size="12" fill="#E2E8F0">Explain OOP concepts</text>

  <!-- typing indicator -->
  <g fill="#38BDF8">
    <circle cx="170" cy="232" r="4"><animate attributeName="cy" values="232;226;232" dur="1s" repeatCount="indefinite"/></circle>
    <circle cx="184" cy="232" r="4"><animate attributeName="cy" values="232;226;232" dur="1s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="198" cy="232" r="4"><animate attributeName="cy" values="232;226;232" dur="1s" begin="0.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- confidence meter -->
  <g transform="translate(340,140)">
    <circle r="46" fill="none" stroke="#1E3A8A" stroke-width="10"/>
    <circle r="46" fill="none" stroke="#38BDF8" stroke-width="10" stroke-dasharray="220 289" transform="rotate(-90)"/>
    <text y="6" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#E2E8F0" text-anchor="middle">76%</text>
  </g>
  <text x="380" y="210" font-family="Poppins, sans-serif" font-size="11" fill="#93C5FD" text-anchor="middle">Confidence</text>
</svg>
