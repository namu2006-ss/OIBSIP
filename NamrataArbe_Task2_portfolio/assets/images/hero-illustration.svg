<svg viewBox="0 0 560 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a laptop displaying code with floating UI cards">
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0B1730"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- soft glow -->
  <ellipse cx="280" cy="430" rx="190" ry="26" fill="#2563EB" opacity="0.18"/>

  <!-- laptop base -->
  <path d="M120 360 L440 360 L470 400 L90 400 Z" fill="url(#baseGrad)"/>
  <rect x="90" y="396" width="380" height="8" rx="4" fill="#1e3a8a"/>

  <!-- laptop screen -->
  <rect x="135" y="90" width="290" height="272" rx="14" fill="#0B1730"/>
  <rect x="150" y="106" width="260" height="238" rx="6" fill="url(#screenGrad)"/>

  <!-- code lines -->
  <g fill="none" stroke-linecap="round" stroke-width="6">
    <line x1="170" y1="132" x2="240" y2="132" stroke="#38BDF8"/>
    <line x1="250" y1="132" x2="300" y2="132" stroke="#93C5FD"/>
    <line x1="186" y1="154" x2="350" y2="154" stroke="#60A5FA"/>
    <line x1="186" y1="176" x2="320" y2="176" stroke="#93C5FD"/>
    <line x1="186" y1="198" x2="270" y2="198" stroke="#38BDF8"/>
    <line x1="170" y1="220" x2="230" y2="220" stroke="#60A5FA"/>
    <line x1="186" y1="242" x2="360" y2="242" stroke="#93C5FD"/>
    <line x1="186" y1="264" x2="300" y2="264" stroke="#38BDF8"/>
    <line x1="170" y1="286" x2="220" y2="286" stroke="#60A5FA"/>
    <line x1="186" y1="308" x2="340" y2="308" stroke="#93C5FD"/>
  </g>

  <!-- blinking cursor -->
  <rect x="346" y="306" width="6" height="16" fill="#38BDF8">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- floating card: code brackets -->
  <g>
    <rect x="20" y="140" width="92" height="64" rx="14" fill="url(#cardGrad)"/>
    <text x="66" y="180" font-family="Poppins, sans-serif" font-size="26" font-weight="700" fill="#1E3A8A" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- floating card: wifi / IoT -->
  <g>
    <rect x="430" y="60" width="96" height="80" rx="16" fill="url(#cardGrad)"/>
    <path d="M460 110 a18 18 0 0 1 36 0" fill="none" stroke="#2563EB" stroke-width="5" stroke-linecap="round"/>
    <path d="M468 116 a10 10 0 0 1 20 0" fill="none" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="478" cy="122" r="4" fill="#1E3A8A"/>
    <text x="478" y="98" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#1E3A8A" text-anchor="middle">IoT</text>
  </g>

  <!-- floating card: check / done -->
  <g>
    <rect x="400" y="300" width="86" height="64" rx="14" fill="url(#cardGrad)"/>
    <path d="M422 332 l10 10 22 -24" fill="none" stroke="#16A34A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- floating dots -->
  <circle cx="60" cy="90" r="6" fill="#38BDF8" opacity="0.8"/>
  <circle cx="500" cy="220" r="5" fill="#2563EB" opacity="0.7"/>
  <circle cx="40" cy="330" r="4" fill="#60A5FA" opacity="0.7"/>
</svg>
