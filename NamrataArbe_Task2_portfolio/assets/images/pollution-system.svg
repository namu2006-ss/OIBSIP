<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pollution complaint and management dashboard illustration">
  <defs>
    <linearGradient id="bgG4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1730"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="url(#bgG4)"/>

  <!-- city skyline -->
  <g fill="#13294B">
    <rect x="40" y="180" width="34" height="100"/>
    <rect x="84" y="150" width="34" height="130"/>
    <rect x="128" y="190" width="34" height="90"/>
  </g>
  <!-- smoke from one building -->
  <g fill="none" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <path d="M101 150 q-10 -20 0 -36 q10 -16 0 -32"/>
  </g>

  <!-- dashboard card -->
  <rect x="220" y="90" width="220" height="150" rx="14" fill="#0B1730" stroke="#2563EB" stroke-width="2"/>
  <text x="240" y="118" font-family="Poppins, sans-serif" font-size="13" font-weight="600" fill="#E2E8F0">Complaints Dashboard</text>
  <g>
    <rect x="240" y="132" width="60" height="36" rx="6" fill="#1E3A8A"/>
    <text x="270" y="155" font-family="Poppins, sans-serif" font-size="14" fill="#38BDF8" text-anchor="middle">24</text>
    <rect x="310" y="132" width="60" height="36" rx="6" fill="#1E3A8A"/>
    <text x="340" y="155" font-family="Poppins, sans-serif" font-size="14" fill="#FACC15" text-anchor="middle">9</text>
    <rect x="380" y="132" width="60" height="36" rx="6" fill="#1E3A8A"/>
    <text x="410" y="155" font-family="Poppins, sans-serif" font-size="14" fill="#4ADE80" text-anchor="middle">15</text>
  </g>
  <g stroke="#38BDF8" stroke-width="6" stroke-linecap="round">
    <line x1="240" y1="190" x2="280" y2="190"/>
    <line x1="240" y1="206" x2="340" y2="206"/>
    <line x1="240" y1="222" x2="300" y2="222"/>
  </g>

  <!-- location pin -->
  <g transform="translate(190,235)">
    <path d="M0 0 C0 -22 22 -22 22 0 C22 16 11 30 11 30 C11 30 0 16 0 0 Z" fill="#EF4444"/>
    <circle cx="11" cy="2" r="6" fill="#0B1730"/>
  </g>
</svg>
